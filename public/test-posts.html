<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>投稿テスト</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .post { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background: #ec4899; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin: 5px; cursor: pointer; }
        button:hover { background: #db2777; }
    </style>
</head>
<body>
    <h1>音声投稿テスト</h1>
    
    <div>
        <button onclick="fetchPosts()">投稿一覧を取得</button>
        <button onclick="window.location.href='http://localhost:3000/voice-board'">音声掲示板を開く</button>
    </div>
    
    <h2>現在の投稿:</h2>
    <div id="posts"></div>
    
    <script>
        async function fetchPosts() {
            try {
                const response = await fetch('/api/voice/upload');
                const data = await response.json();
                
                const postsDiv = document.getElementById('posts');
                postsDiv.innerHTML = '';
                
                if (data.posts && data.posts.length > 0) {
                    postsDiv.innerHTML = `<p>投稿数: ${data.posts.length}</p>`;
                    data.posts.forEach((post, index) => {
                        postsDiv.innerHTML += `
                            <div class="post">
                                <strong>${index + 1}. ${post.username}</strong><br>
                                メッセージ: ${post.message}<br>
                                カテゴリー: ${post.category}<br>
                                時刻: ${new Date(post.postedAt).toLocaleString('ja-JP')}
                            </div>
                        `;
                    });
                } else {
                    postsDiv.innerHTML = '<p>投稿がありません</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('posts').innerHTML = '<p style="color: red;">エラーが発生しました</p>';
            }
        }
        
        // ページ読み込み時に自動取得
        window.onload = fetchPosts;
    </script>
</body>
</html>
